services:
  - type: web
    name: zenith-privacy-backend
    env: python
    rootDir: Zenith privacy/backend

    buildCommand: |
      pip install -r requirements.txt

    startCommand: |
      uvicorn app.main:app --host 0.0.0.0 --port $PORT

    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
